name: Daily AI Agent Sync

on:
  schedule:
    # UTC 01:00 對應台灣時間 (UTC+8) 早上 09:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動觸發

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Main Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DASHBOARD_PAGE_ID: ${{ secrets.DASHBOARD_PAGE_ID }}
          PAPER_DB_ID: ${{ secrets.PAPER_DB_ID }}
          NEWS_DB_ID: ${{ secrets.NEWS_DB_ID }}
          STATS_DB_ID: ${{ secrets.STATS_DB_ID }}
          TREND_DB_ID: ${{ secrets.TREND_DB_ID }}
        run: |
          python main.py
